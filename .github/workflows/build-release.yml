# Builds the desktop app for all three platforms and publishes a GitHub Release.
#
# Trigger: push a version tag, e.g.
#   git tag v1.0.8
#   git push origin v1.0.8
#
# The release will contain:
#   gullwing-macos.dmg        (drag-to-Applications installer)
#   Gullwing.exe              (Windows standalone)
#   gullwing-linux            (Linux standalone binary)
#   checksums.txt             (SHA-256 digests for all three artifacts)

name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Tag must match __version__
        run: |
          CODE="$(python3 - <<'PY'
          import re, pathlib
          s = pathlib.Path("exposure_checker/_core.py").read_text()
          print(re.search(r'__version__\s*=\s*["\']([^"\']+)', s).group(1))
          PY
          )"
          TAG="${GITHUB_REF_NAME#v}"
          echo "release tag = $TAG   __version__ = $CODE"
          if [ "$TAG" != "$CODE" ]; then
            echo "::error::Release tag v$TAG does not match exposure_checker.__version__ ($CODE). Bump __version__ in exposure_checker/_core.py to match the tag, or retag." >&2
            exit 1
          fi

  build:
    needs: version-guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
          - os: ubuntu-22.04
            name: Linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      # tkinter ships with python.org Windows/macOS builds but not Ubuntu
      - name: Install tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Install build dependencies
        run: pip install -r packaging/requirements-build.txt

      - name: Install package
        run: pip install -e .

      - name: Build app
        run: pyinstaller packaging/gullwing.spec

      # ── Smoke-test the built artifact ─────────────────────────────────────────
      # Building with the package pip-installed always resolves imports at build
      # time, so a frozen binary that fails to resolve imports at runtime would
      # still build green. Run the artifact itself to catch that.
      - name: Smoke-test built binary (Linux)
        if: runner.os == 'Linux'
        run: ./dist/Gullwing --smoke

      - name: Smoke-test built binary (Windows)
        if: runner.os == 'Windows'
        run: ./dist/Gullwing.exe --smoke

      - name: Smoke-test built binary (macOS)
        if: runner.os == 'macOS'
        run: ./dist/Gullwing.app/Contents/MacOS/Gullwing --smoke

      # ── macOS: wrap in .dmg ───────────────────────────────────────────────────
      - name: Package macOS .dmg
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/dmg
          cp -r "dist/Gullwing.app" dist/dmg/
          hdiutil create \
            -volname "Gullwing" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            "dist/gullwing-macos.dmg"

      # ── Upload per-platform artifact ──────────────────────────────────────────
      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: macos-dmg
          path: dist/gullwing-macos.dmg

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: windows-exe
          path: "dist/Gullwing.exe"

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: linux-bin
          path: dist/Gullwing

  # ── Combine all artifacts into one GitHub Release ────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts

      - name: Rename Linux binary
        run: |
          mv artifacts/linux-bin/Gullwing artifacts/linux-bin/gullwing-linux
          chmod +x artifacts/linux-bin/gullwing-linux

      - name: Generate SHA-256 checksums
        run: |
          sha256sum \
            artifacts/macos-dmg/gullwing-macos.dmg \
            artifacts/windows-exe/Gullwing.exe \
            artifacts/linux-bin/gullwing-linux \
            > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: "Gullwing ${{ github.ref_name }}"
          body: |
            ## Download

            | Platform | File | Notes |
            |---|---|---|
            | macOS | `gullwing-macos.dmg` | Open DMG → drag app to Applications |
            | Windows | `Gullwing.exe` | Run as Administrator for full results |
            | Linux | `gullwing-linux` | `chmod +x` then run |

            ## What's new
            <!-- fill in release notes here -->
          files: |
            artifacts/macos-dmg/gullwing-macos.dmg
            artifacts/windows-exe/Gullwing.exe
            artifacts/linux-bin/gullwing-linux
            checksums.txt
          fail_on_unmatched_files: true
